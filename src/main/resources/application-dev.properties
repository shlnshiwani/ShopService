# ── DEV ──────────────────────────────────────────────────────────────────────
server.port=8090

spring.datasource.url=jdbc:h2:file:./data/shopdb-dev;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.seed-data=true

# Origins allowed to call this service (comma-separated)
app.cors.allowed-origins=http://localhost:8080,http://localhost:8081,http://127.0.0.1:8080

# Swagger UI enabled in dev
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

logging.level.com.shopservice=DEBUG
