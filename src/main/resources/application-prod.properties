# ── PROD ─────────────────────────────────────────────────────────────────────
# For real production, replace H2 with PostgreSQL and inject via env vars:
#   DB_URL, DB_USER, DB_PASS
server.port=${PORT:8090}

spring.datasource.url=jdbc:h2:file:./data/shopdb-prod;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false

app.seed-data=false

# Only your real production domain(s) — no localhost
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://shop.example.com}

# Swagger disabled in production — never expose API docs publicly
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

logging.level.com.shopservice=WARN
logging.level.root=WARN
